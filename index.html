<!DOCTYPE html>
<!--
  ============================================================
  ななぷれ 腕時計 特集ページ
  ------------------------------------------------------------
  ・楽天GOLD（RMS）にそのままアップロードできる構成です。
  ・フリーページとして丸ごとアップロードする場合はこのファイルをそのまま使用してください。
  ・既存のGOLDテンプレート内の「フリーHTML」枠に貼り付ける場合は、
    <body>内の <div class="scroll-container"> 以降のみを貼り付け、
    style.css / script.js は店舗の共通ファイルとして読み込んでください。
  ・画像URL、商品URL、価格、お気に入りボタンの差し替え箇所には
    「▼差し替え▼」のコメントを付けています。検索して置き換えてください。
  ============================================================
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ななぷれ | 腕時計 特集 - 毎日を少し特別にする一本</title>
<meta name="description" content="ななぷれが選ぶ、日常を格上げする腕時計特集。ギフトにも自分へのご褒美にも。">

<!-- Google Fonts（見出し：明朝で雑誌のような品格 / 本文：可読性重視のゴシック） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============================================================
     スクロールコンテナ（この中がScroll Snapの対象）
     ============================================================ -->
<div class="scroll-container" id="scrollContainer">

  <!-- ============================================================
       HERO（表紙セクション）
       ============================================================ -->
  <section class="hero-section snap-section" id="hero">
    <div class="hero-media">
      <!-- ▼▼ 表紙画像を差し替え（推奨サイズ：横1600px以上） ▼▼ -->
      <img
        src="images/kanban.jpg"
        alt="ななぷれ 腕時計特集"
        class="hero-image"
        loading="eager">
      <!-- ▲▲ 表紙画像を差し替え ▲▲ -->
      <!-- 看板画像自体にタイトル・コピーが入っているため、HTML側の文字オーバーレイ（hero-content）は非表示にしている -->
    </div>

    <button class="scroll-cue" id="scrollCue" type="button" aria-label="次のセクションへスクロール">
      <span class="scroll-cue-line"></span>
    </button>
  </section>

  <!-- ============================================================
       リードセクション（表紙の次に入るイメージカット＋リード文）
       画像自体にコピーが入っているため、テキストオーバーレイなし
       ============================================================ -->
  <section class="lead-section snap-section" id="lead">
    <div class="lead-media">
      <!-- ▼▼ 画像を差し替え ▼▼ -->
      <img
        src="images/photo01.jpg"
        alt="ななぷれ 特集リード"
        class="lead-image"
        loading="lazy">
      <!-- ▲▲ 画像を差し替え ▲▲ -->
    </div>
  </section>

  <!-- ============================================================
       商品セクション：ここから下を複製すれば商品を追加できます
       複製時の差し替え箇所：
         1. section の id（product-2 など重複しない値に）
         2. 商品画像 src / alt
         3. ブランド名（product-brand）
         4. 商品名（product-name）
         5. 価格（product-price）
         6. キャッチコピー（product-copy）
         7. 商品ページURL（btn-primary の href）
         8. お気に入りボタン（楽天お気に入り登録コードに差し替え）
       ============================================================ -->

  <!-- ---------- 商品 1：COACH 万能バッグ ---------- -->
  <!-- COACHは画像下部にあらかじめ余白を作ったデザインのため、
       通常の「画像＋テキスト情報」構成ではなく、画像いっぱいに表示して
       その余白部分に価格・ボタンを重ねる product-section--overlay 構成にしている -->
  <section class="product-section product-section--overlay snap-section" id="product-1">
    <div class="product-media">
      <!-- ▼▼ 商品画像を差し替え ▼▼ -->
      <img
        src="images/coach_cbm10_ima47.jpg"
        alt="COACH CBM10 IMA47"
        class="product-image"
        loading="lazy">
      <!-- ▲▲ 商品画像を差し替え ▲▲ -->
    </div>

    <div class="product-overlay-info" data-animate>
      <p class="product-price product-price--overlay">
        <!-- ▼ 価格を差し替え ▼ -->
        <span class="price-value">36,230</span>円　<span class="price-note">送料無料</span>
        <!-- ▲ 価格を差し替え ▲ -->
      </p>

      <div class="product-actions product-actions--overlay">
        <!-- ▼ 商品ページURLを差し替え ▼ -->
        <a class="btn btn-primary" href="https://item.rakuten.co.jp/YOUR_SHOP_ID/YOUR_ITEM_ID_1/" target="_blank" rel="noopener">
          詳しく見る
        </a>
        <!-- ▲ 商品ページURLを差し替え ▲ -->

        <!-- ▼▼ 楽天お気に入り登録ボタンに差し替え ▼▼ -->
        <button class="btn btn-favorite" type="button" data-favorite aria-pressed="false" aria-label="お気に入りに登録">
          <span class="favorite-label">お気に入りに＋</span>
        </button>
        <!-- ▲▲ 楽天お気に入り登録ボタンに差し替え ▲▲ -->
      </div>
    </div>
  </section>

  <!-- MARNI・LONGCHAMPトートは画像下部にあらかじめ余白を作ったデザインのため、
       COACHと同じ product-section--overlay 構成にしている -->

  <!-- ---------- 商品 2：MARNI ハンドバッグ ---------- -->
  <section class="product-section product-section--overlay snap-section" id="product-2">
    <div class="product-media">
      <!-- ▼▼ 商品画像を差し替え ▼▼ -->
      <img
        src="images/marni_bmmp0069q0-p3860.jpg"
        alt="MARNI BMMP0069Q0-P3860"
        class="product-image"
        loading="lazy">
      <!-- ▲▲ 商品画像を差し替え ▲▲ -->
    </div>

    <div class="product-overlay-info" data-animate>
      <p class="product-price product-price--overlay">
        <!-- ▼ 価格を差し替え ▼ -->
        <span class="price-value">87,960</span>円　<span class="price-note">送料無料</span>
        <!-- ▲ 価格を差し替え ▲ -->
      </p>

      <div class="product-actions product-actions--overlay">
        <!-- ▼ 商品ページURLを差し替え ▼ -->
        <a class="btn btn-primary" href="https://item.rakuten.co.jp/YOUR_SHOP_ID/YOUR_ITEM_ID_2/" target="_blank" rel="noopener">
          詳しく見る
        </a>
        <!-- ▲ 商品ページURLを差し替え ▲ -->

        <!-- ▼▼ 楽天お気に入り登録ボタンに差し替え ▼▼ -->
        <button class="btn btn-favorite" type="button" data-favorite aria-pressed="false" aria-label="お気に入りに登録">
          <span class="favorite-label">お気に入りに＋</span>
        </button>
        <!-- ▲▲ 楽天お気に入り登録ボタンに差し替え ▲▲ -->
      </div>
    </div>
  </section>

  <!-- ---------- 商品 3：LONGCHAMP トート ---------- -->
  <section class="product-section product-section--overlay snap-section" id="product-3">
    <div class="product-media">
      <!-- ▼▼ 商品画像を差し替え ▼▼ -->
      <img
        src="images/longchamp_l1899089p71.jpg"
        alt="LONGCHAMP L1899089P71"
        class="product-image"
        loading="lazy">
      <!-- ▲▲ 商品画像を差し替え ▲▲ -->
    </div>

    <div class="product-overlay-info" data-animate>
      <p class="product-price product-price--overlay">
        <!-- ▼ 価格を差し替え ▼ -->
        <span class="price-value">24,000</span>円　<span class="price-note">送料無料</span>
        <!-- ▲ 価格を差し替え ▲ -->
      </p>

      <div class="product-actions product-actions--overlay">
        <!-- ▼ 商品ページURLを差し替え ▼ -->
        <a class="btn btn-primary" href="https://item.rakuten.co.jp/YOUR_SHOP_ID/YOUR_ITEM_ID_3/" target="_blank" rel="noopener">
          詳しく見る
        </a>
        <!-- ▲ 商品ページURLを差し替え ▲ -->

        <!-- ▼▼ 楽天お気に入り登録ボタンに差し替え ▼▼ -->
        <button class="btn btn-favorite" type="button" data-favorite aria-pressed="false" aria-label="お気に入りに登録">
          <span class="favorite-label">お気に入りに＋</span>
        </button>
        <!-- ▲▲ 楽天お気に入り登録ボタンに差し替え ▲▲ -->
      </div>
    </div>
  </section>

  <!-- ============================================================
       クロージングセクション（ショップトップへの導線）
       ============================================================ -->
  <section class="closing-section snap-section" id="closing">
    <div class="closing-content" data-animate>
      <p class="closing-eyebrow">ななぷれ</p>
      <h2 class="closing-title">あなたの毎日に、<br>寄り添う一本を。</h2>
      <!-- ▼ ショップトップURLを差し替え ▼ -->
      <a class="btn btn-outline" href="https://www.rakuten.co.jp/YOUR_SHOP_ID/" target="_blank" rel="noopener">
        SHOPへ戻る
      </a>
      <!-- ▲ ショップトップURLを差し替え ▲ -->
    </div>
  </section>

</div><!-- /.scroll-container -->

<script src="script.js"></script>
</body>
</html>
